<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SloozeAI Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f8f7f4;
        --surface: #ffffff;
        --border: #e2e0da;
        --text: #1a1918;
        --muted: #6b6966;
        --accent: #1a6ef5;
        --accent-light: #eef3ff;
        --answer-bg: #f0f4ff;
        --answer-border: #c7d7fa;
        --radius: 12px;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        --shadow-hover: 0 4px 20px rgba(0, 0, 0, 0.12);
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition: all 0.4s ease;
      }

      /* ── HOME STATE ── */
      #home {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        gap: 32px;
        transition: opacity 0.3s ease;
      }

      #home.hidden {
        opacity: 0;
        pointer-events: none;
        position: absolute;
      }

      .logo-img {
        width: 52px;
        height: 52px;
        object-fit: contain;
        border-radius: 10px;
      }

      .logo-img-sm {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        margin-right: 8px;
      }

      .home-logo {
        font-family: "DM Serif Display", serif;
        font-size: 52px;
        letter-spacing: -1px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 0;
      }

      .logo-img {
        width: 52px;
        height: 52px;
        object-fit: contain;
        border-radius: 10px;
        margin-right: 14px;
      }

      .home-logo span {
        color: var(--accent);
        margin-left: -4px;
      }

      .home-tagline {
        color: var(--muted);
        font-size: 15px;
        margin-top: -20px;
      }

      /* ── SEARCH BAR (shared) ── */
      .search-wrap {
        width: 100%;
        max-width: 580px;
        position: relative;
      }

      .search-bar {
        width: 100%;
        padding: 16px 56px 16px 20px;
        font-family: "DM Sans", sans-serif;
        font-size: 16px;
        border: 1.5px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        outline: none;
        box-shadow: var(--shadow);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        color: var(--text);
      }

      .search-bar:focus {
        border-color: var(--accent);
        box-shadow:
          0 0 0 3px rgba(26, 110, 245, 0.12),
          var(--shadow);
      }

      .search-btn {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--accent);
        border: none;
        border-radius: 999px;
        width: 40px;
        height: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .search-btn:hover {
        background: #155de0;
        transform: translateY(-50%) scale(1.05);
      }
      .search-btn:active {
        transform: translateY(-50%) scale(0.97);
      }

      .search-btn svg {
        width: 18px;
        height: 18px;
        stroke: white;
        fill: none;
      }

      /* ── RESULTS STATE ── */
      #results-page {
        display: none;
        flex-direction: column;
        min-height: 100vh;
      }

      #results-page.visible {
        display: flex;
      }

      /* Top bar */
      .top-bar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        position: sticky;
        top: 0;
        z-index: 10;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
      }

      .top-logo {
        font-family: "DM Serif Display", serif;
        font-size: 26px;
        color: var(--text);
        white-space: nowrap;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0px;
      }

      .top-logo span {
        color: var(--accent);
        margin-left: -4px;
      }

      .top-bar .search-wrap {
        max-width: 560px;
        flex: 1;
      }
      .top-bar .search-bar {
        padding: 12px 52px 12px 18px;
        font-size: 15px;
      }
      .top-bar .search-btn {
        width: 36px;
        height: 36px;
      }

      /* Results body */
      .results-body {
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
        padding: 28px 24px 60px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .results-meta {
        font-size: 13px;
        color: var(--muted);
      }

      /* AI Answer card */
      .answer-card {
        background: var(--answer-bg);
        border: 1.5px solid var(--answer-border);
        border-radius: var(--radius);
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        animation: fadeUp 0.4s ease both;
      }

      .answer-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .answer-label svg {
        width: 14px;
        height: 14px;
        stroke: var(--accent);
        fill: none;
      }

      .answer-text {
        font-size: 15px;
        line-height: 1.7;
        color: var(--text);
      }

      /* Source cards */
      .sources-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .source-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-decoration: none;
        color: inherit;
        transition:
          box-shadow 0.2s,
          border-color 0.2s,
          transform 0.15s;
        animation: fadeUp 0.4s ease both;
        cursor: pointer;
      }

      .source-card:hover {
        box-shadow: var(--shadow-hover);
        border-color: #c0bbb4;
        transform: translateY(-1px);
      }

      .source-num {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.04em;
      }

      .source-title {
        font-size: 16px;
        font-weight: 500;
        color: var(--accent);
        line-height: 1.4;
      }

      .source-url {
        font-size: 12px;
        color: #3a7a3a;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .source-snippet {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
        margin-top: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* Loading */
      .loading {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
        color: var(--muted);
        padding: 16px 0;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      /* Error */
      .error-card {
        background: #fff5f5;
        border: 1.5px solid #fcc;
        border-radius: var(--radius);
        padding: 16px 20px;
        font-size: 14px;
        color: #c0392b;
        line-height: 1.6;
      }

      /* Animations */
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

    <script>
      const API = "https://websearch-agent.onrender.com/search";

      const homeEl = document.getElementById("home");
      const resultsPage = document.getElementById("results-page");
      const resultsBody = document.getElementById("results-body");
      const homeInput = document.getElementById("home-input");
      const topInput = document.getElementById("top-input");
      const topLogo = document.getElementById("top-logo");

      function goHome() {
        resultsPage.classList.remove("visible");
        homeEl.classList.remove("hidden");
        homeInput.value = "";
        homeInput.focus();
      }

      topLogo.addEventListener("click", (e) => {
        e.preventDefault();
        goHome();
      });

      async function runSearch(query) {
        if (!query.trim()) return;

        homeEl.classList.add("hidden");
        resultsPage.classList.add("visible");
        topInput.value = query;

        resultsBody.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        Searching the web and generating answer...
      </div>`;

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, max_results: 5 }),
          });

          const data = await res.json();

          if (!res.ok) {
            resultsBody.innerHTML = `
          <div class="error-card">
            Something went wrong: ${data.detail || "Unknown error"}
          </div>`;
            return;
          }

          const sourcesHtml = data.sources
            .map(
              (s, i) => `
        <a class="source-card" href="${s.url}" target="_blank" rel="noopener"
           style="animation-delay:${0.1 + i * 0.06}s">
          <span class="source-num">Source ${i + 1}</span>
          <span class="source-title">${s.title}</span>
          <span class="source-url">${s.url}</span>
          <span class="source-snippet">${s.snippet}</span>
        </a>`,
            )
            .join("");

          resultsBody.innerHTML = `
        <div class="results-meta">${data.result_count} sources · Powered by Gemini 2.5 Flash + Tavily</div>
        <div class="answer-card">
          <div class="answer-label">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
            AI Answer
          </div>
          <div class="answer-text">${data.answer}</div>
        </div>
        <div class="sources-label">Web Sources</div>
        ${sourcesHtml}`;
        } catch (err) {
          resultsBody.innerHTML = `
        <div class="error-card">
          Could not reach the server. Make sure the FastAPI backend is running on port 8000.<br><br>
          <code>python -m uvicorn main:app --reload</code>
        </div>`;
        }
      }

      // Event bindings
      document
        .getElementById("home-btn")
        .addEventListener("click", () => runSearch(homeInput.value));
      document
        .getElementById("top-btn")
        .addEventListener("click", () => runSearch(topInput.value));

      homeInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") runSearch(homeInput.value);
      });
      topInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") runSearch(topInput.value);
      });

      homeInput.focus();
    </script>
  </body>
</html>
